<!DOCTYPE html>
<html lang="en" data-theme="light" data-base-url="http://localhost:8000/example/">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro-term - Toast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900;950&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/term-icons/dist/retro-term-icons.css?v=20260621">
    <link rel="stylesheet" href="../retro-term.css?v=20260621">
</head>

<body>
    <div class="rt-admin">
        <div class="rt-sbr_overlay" id="sidebarOverlay"></div>
        <aside class="rt-sbr" id="sidebar">
            <div class="rt-sbr_brand"><span class="rt-brand_dot"></span><span>Retro-term</span></div>
            <div class="rt-sbr_label">Main Menu</div>
            <nav class="rt-sbr_nav"><a class="rt-sbr_link" href="dashboard.html"><i class="rt rt-dashboard"
                        aria-hidden="true"></i>Dashboard</a>
                <div class="nav-dropdown" data-nav-dropdown><button class="nav-dropdown-toggle" type="button"><i
                            class="rt rt-users" aria-hidden="true"></i>UI Elements<span class="rt-sbr_badge">8</span><i
                            class="rt rt-chevron-down nav-dropdown-chevron" aria-hidden="true"></i></button>
                    <div class="nav-dropdown-menu"><a class="nav-dropdown-item" href="buttons.html">Button</a><a
                            class="nav-dropdown-item" href="badge.html">Badge</a><a class="nav-dropdown-item"
                            href="modal.html">Modal</a><a class="nav-dropdown-item" href="toast.html">Toast</a><a
                            class="nav-dropdown-item" href="table.html">Table</a><a class="nav-dropdown-item"
                            href="input.html">Input Form</a><a class="nav-dropdown-item"
                            href="typography.html">Typography</a><a class="nav-dropdown-item"
                            href="color.html">Color</a>
                    </div>
                </div>
                <div class="rt-sbr_label">Documentation</div>
                <a class="rt-sbr_link" href="doc.html">
                    <i class="rt rt-question" aria-hidden="true"></i>
                    Doc
                </a>
            </nav>
            <div class="rt-sbr_footer">
                <div class="rt-sbr_user">
                    <div class="rt-sbr_avatar">C</div>
                    <div class="rt-sbr_user-info">
                        <div class="rt-sbr_user-name">2026. Retro-term</div>
                        <div class="rt-sbr_user-role">All Rights Reserved</div>
                    </div>
                </div>
            </div>
        </aside>
        <main class="rt-main">
            <div class="rt-topbar">
                <button class="rt-topbar_menu-tbl" id="menuBtn" aria-label="Menu"><i class="rt rt-menu"
                        aria-hidden="true"></i></button>
                <div class="rt-topbar_title-wrap">
                    <h1 class="rt-topbar_title" title="Toast">Toast</h1>
                    <span class="rt-topbar_breadcrumb" title="Feedback / Toasts">Feedback / Toasts</span>
                </div>
                <div class="rt-topbar_search">
                    <i class="rt rt-search" aria-hidden="true"></i>
                    <input type="text" placeholder="Search something...">
                </div>

                <div class="rt-topbar_actions">
                    <button class="rt-topbar_icon-tbl" id="themeToggle" title="Toggle Theme">
                        <i class="rt rt-moon moon-icon" aria-hidden="true"></i>
                        <i class="rt rt-sun sun-icon" aria-hidden="true" style="display:none"></i>
                    </button>

                    <!-- Dropdown Notification -->
                    <div class="dropdown" data-dropdown>
                        <button class="rt-topbar_icon-tbl" data-dropdown-trigger title="Notifications">
                            <i class="rt rt-notification" aria-hidden="true"></i>
                            <span class="rt-topbar_dot"></span>
                        </button>
                        <div class="dropdown-menu">
                            <div class="dropdown-label">Notifications</div>
                            <button class="dropdown-item">
                                <i class="rt rt-database" aria-hidden="true"></i>
                                New user signed up
                            </button>
                            <button class="dropdown-item">
                                <i class="rt rt-check" aria-hidden="true"></i>
                                Project completed
                            </button>
                            <button class="dropdown-item">
                                <i class="rt rt-info" aria-hidden="true"></i>
                                Payment received
                            </button>
                            <div class="dropdown-divider"></div>
                            <button class="dropdown-item">
                                View all
                                <i class="rt rt-chevron-right" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>
                    <div class="dropdown" data-dropdown>
                        <button class="rt-topbar_icon-tbl" data-dropdown-trigger title="Notifications">
                            <i class="rt rt-settings" aria-hidden="true"></i>
                        </button>
                        <div class="dropdown-menu">
                            <button class="dropdown-item">
                                <i class="rt rt-person-circle" aria-hidden="true"></i>
                                Profile
                            </button>
                            <div class="dropdown-divider"></div>
                            <a class="dropdown-item" href="../login.html">
                                <i class="rt rt-logout-box" aria-hidden="true"></i>
                                Logout
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card rt-section rt-p3">
                <h2>Toast Variants</h2>
                <div class="rt-row rt-flow--sm">
                    <button class="btn btn-success" data-toast-variant="success">Success</button>
                    <button class="btn btn-warning" data-toast-variant="warning">Warning</button>
                    <button class="btn btn-danger" data-toast-variant="danger">Danger</button>
                </div>
            </div>
            <div class="card rt-section rt-p3">
                <h2>Toast Position</h2>
                <div class="rt-row rt-flow">
                    <button class="btn btn-secondary" data-toast-position-btn data-toast-position="top-left">Top
                        Left</button>
                    <button class="btn btn-secondary" data-toast-position-btn data-toast-position="top-center">Top
                        Center</button>
                    <button class="btn btn-secondary" data-toast-position-btn data-toast-position="top-right">Top
                        Right</button>
                    <button class="btn btn-secondary" data-toast-position-btn data-toast-position="bottom-left">Bottom
                        Left</button>
                    <button class="btn btn-secondary" data-toast-position-btn data-toast-position="bottom-center">Bottom
                        Center</button>
                    <button class="btn btn-secondary" data-toast-position-btn data-toast-position="bottom-right">Bottom
                        Right</button>
                </div>
            </div>
        </main>
    </div>

    <div class="rt-toast rt-toast--success" id="demoToast" aria-live="polite" aria-atomic="true">
        <div class="rt-toast__icon"><i class="rt rt-success-circle" aria-hidden="true"></i></div>
        <div class="rt-toast__content">
            <div class="rt-toast__title">Toast Success</div>
            <div class="rt-toast__text">Example `rt-toast` element for short-lived messages.</div>
        </div>
        <button class="rt-toast__close" type="button" id="toastCloseBtn" aria-label="Close toast">
            <i class="rt rt-close" aria-hidden="true"></i>
        </button>
    </div>

    <script src="../retro-term.js?v=20260621" defer></script>
</body>

</html>
