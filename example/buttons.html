<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro-term - Buttons</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900;950&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/term-icons/dist/term-icons.css">
    <link rel="stylesheet" href="../retro-term.css">
</head>

<body>

    <div class="rt-admin">

        <!-- SIDEBAR OVERLAY -->
        <div class="rt-sbr_overlay" id="sidebarOverlay"></div>

        <!-- ===== SIDEBAR ===== -->
        <aside class="rt-sbr" id="sidebar">
            <div class="rt-sbr_brand">
                <span class="rt-brand_dot"></span>
                <span>Retro-term</span>
            </div>

            <div class="rt-sbr_label">Main Menu</div>
            <nav class="rt-sbr_nav">
                <a class="rt-sbr_link" href="dashboard.html">
                    <i class="rt-icon term-icon-dashboard" aria-hidden="true"></i>
                    Dashboard
                </a>

                <!-- Sidebar Dropdown: Retro-term Ui -->
                <div class="rt-sd" data-sd>
                    <button class="rt-sd_trigger is-active" type="button">
                        <i class="rt-icon term-icon-users" aria-hidden="true"></i>
                        UI Elements
                        <span class="rt-sbr_badge">8</span>
                        <i class="rt-icon term-icon-chevron-down rt-sd_chevron" aria-hidden="true"></i>
                    </button>
                    <div class="rt-sd_children">
                        <a class="rt-sd_child is-active" href="buttons.html">
                            Button
                        </a>
                        <a class="rt-sd_child" href="badge.html">
                            Badge
                        </a>
                        <a class="rt-sd_child" href="popup.html">
                            Popup
                        </a>
                        <a class="rt-sd_child" href="toast.html">
                            Toast
                        </a>
                        <a class="rt-sd_child" href="table.html">
                            Table
                        </a>
                        <a class="rt-sd_child" href="input.html">
                            Input Form
                        </a>
                        <a class="rt-sd_child" href="typography.html">
                            Typography
                        </a>
                        <a class="rt-sd_child" href="color.html">
                            Color
                        </a>
                    </div>
                </div>

                <div class="rt-sbr_label">Documentation</div>
                <a class="rt-sbr_link" href="doc.html">
                    <i class="rt-icon term-icon-question" aria-hidden="true"></i>
                    Doc
                </a>
            </nav>

            <div class="rt-sbr_footer">
                <div class="rt-sbr_user">
                    <div class="rt-sbr_avatar">C</div>
                    <div class="rt-sbr_user-info">
                        <div class="rt-sbr_user-name">2026. Retro-term</div>
                        <div class="rt-sbr_user-role">All Rights Reserved</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="rt-main">
            <!-- TOPBAR -->
            <div class="rt-topbar">
                <button class="rt-topbar_menu-tbl" id="menuBtn" aria-label="Menu">
                    <i class="rt-icon term-icon-menu" aria-hidden="true"></i>
                </button>
                <h1 class="rt-topbar_title">Buttons</h1>

                <div class="rt-topbar_search">
                    <i class="rt-icon term-icon-search" aria-hidden="true"></i>
                    <input type="text" placeholder="Search something...">
                </div>

                <div class="rt-topbar_actions">
                    <button class="rt-topbar_icon-tbl" id="themeToggle" title="Toggle Theme">
                        <i class="rt-icon term-icon-moon moon-icon" aria-hidden="true"></i>
                        <i class="rt-icon term-icon-sun sun-icon" aria-hidden="true" style="display:none"></i>
                    </button>

                    <!-- Dropdown Notification -->
                    <div class="rt-dd" data-dd>
                        <button class="rt-topbar_icon-tbl" data-dd-trigger title="Notifications">
                            <i class="rt-icon term-icon-notification" aria-hidden="true"></i>
                            <span class="rt-topbar_dot"></span>
                        </button>
                        <div class="rt-dd_menu">
                            <div class="rt-dd_label">Notifications</div>
                            <button class="rt-dd_item">
                                <i class="rt-icon term-icon-database" aria-hidden="true"></i>
                                New user signed up
                            </button>
                            <button class="rt-dd_item">
                                <i class="rt-icon term-icon-check" aria-hidden="true"></i>
                                Project completed
                            </button>
                            <button class="rt-dd_item">
                                <i class="rt-icon term-icon-info" aria-hidden="true"></i>
                                Payment received
                            </button>
                            <div class="rt-dd_divider"></div>
                            <button class="rt-dd_item">
                                View all
                                <i class="rt-icon term-icon-chevron-right" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>
                    <div class="rt-dd" data-dd>
                        <button class="rt-topbar_icon-tbl" data-dd-trigger title="Notifications">
                            <i class="rt-icon term-icon-settings" aria-hidden="true"></i>
                        </button>
                        <div class="rt-dd_menu">
                            <button class="rt-dd_item">
                                <i class="rt-icon term-icon-person-circle" aria-hidden="true"></i>
                                Profile
                            </button>
                            <div class="rt-dd_divider"></div>
                            <a class="rt-dd_item" href="../login.html">
                                <i class="rt-icon term-icon-logout-box" aria-hidden="true"></i>
                                Logout
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- DEMO: BUTTONS (rt-tbl) -->
            <div class="rt-panel rt-section">
                <div class="rt-panel_head">
                    <div>
                        <div class="rt-panel_title">Komponen: Tombol (rt-tbl)</div>
                        <div class="rt-panel_subtitle">Variasi warna & ukuran</div>
                    </div>
                </div>
                <div class="rt-panel_body">
                    <div class="rt-label">Warna</div>
                    <div class="rt-row rt-py2">
                        <button class="rt-tbl rt-tbl-primary">Primary</button>
                        <button class="rt-tbl rt-tbl-secondary">Secondary</button>
                        <button class="rt-tbl rt-tbl-success">Success</button>
                        <button class="rt-tbl rt-tbl-warning">Warning</button>
                        <button class="rt-tbl rt-tbl-danger">Danger</button>
                        <button class="rt-tbl rt-tbl-accent">Accent</button>
                        <button class="rt-tbl rt-tbl-purple">Purple</button>
                        <button class="rt-tbl rt-tbl-ghost">Ghost</button>
                        <button class="rt-tbl rt-tbl-outline">Outline</button>
                    </div>

                    <div class="rt-label">Dengan Ikon</div>
                    <div class="rt-row rt-py2">
                        <button class="rt-tbl rt-tbl-primary">
                            <i class="rt-icon term-icon-add" aria-hidden="true"></i>
                            Add Data
                        </button>
                        <button class="rt-tbl rt-tbl-success">
                            <i class="rt-icon term-icon-check" aria-hidden="true"></i>
                            Save
                        </button>
                        <button class="rt-tbl rt-tbl-danger">
                            <i class="rt-icon term-icon-delete" aria-hidden="true"></i>
                            Delete
                        </button>
                        <button class="rt-tbl rt-tbl-outline">
                            <i class="rt-icon term-icon-download" aria-hidden="true"></i>
                            Download
                        </button>
                    </div>

                    <div class="rt-label">Ukuran</div>
                    <div class="rt-row rt-py2">
                        <button class="rt-tbl rt-tbl-primary rt-tbl--sm">Small</button>
                        <button class="rt-tbl rt-tbl-primary">Default</button>
                        <button class="rt-tbl rt-tbl-primary rt-tbl--lg">Large</button>
                        <button class="rt-tbl rt-tbl-primary rt-tbl--icon" title="Icon only">
                            <i class="rt-icon term-icon-add" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../retro-term.js" defer></script>

</body>

</html>
