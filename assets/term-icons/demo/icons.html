<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Term Icons Demo</title>
  <link rel="stylesheet" href="../dist/term-icons.css">
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #2c3e50;
      color: #ecf0f1;
      font-family: "Courier New", Courier, monospace;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .demo-item {
      padding: 12px;
      border: 1px solid #bdc3c7;
    }

    .demo-icon {
      display: block;
      margin-bottom: 8px;
      font-size: 20px;
    }
  </style>
</head>

<body>
  <h1>Term Icons</h1>
  <p>CSS mask preview.</p>

  <div class="demo-grid">
    <div class="demo-item"><i class="term-icon term-icon-dashboard demo-icon" aria-hidden="true"></i>dashboard</div>
    <div class="demo-item"><i class="term-icon term-icon-users demo-icon" aria-hidden="true"></i>users</div>
    <div class="demo-item"><i class="term-icon term-icon-settings demo-icon" aria-hidden="true"></i>settings</div>
    <div class="demo-item"><i class="term-icon term-icon-logout demo-icon" aria-hidden="true"></i>logout</div>
    <div class="demo-item"><i class="term-icon term-icon-refresh demo-icon" aria-hidden="true"></i>refresh</div>
    <div class="demo-item"><i class="term-icon term-icon-database demo-icon" aria-hidden="true"></i>database</div>
  </div>
</body>

</html>
