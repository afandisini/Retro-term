<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro-term - Input Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900;950&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/term-icons/dist/term-icons.css">
    <link rel="stylesheet" href="../retro-term.css">
</head>

<body>
    <div class="rt-admin">
        <div class="rt-sbr_overlay" id="sidebarOverlay"></div>
        <aside class="rt-sbr" id="sidebar">
            <div class="rt-sbr_brand"><span class="rt-brand_dot"></span><span>Retro-term</span></div>
            <div class="rt-sbr_label">Main Menu</div>
            <nav class="rt-sbr_nav"><a class="rt-sbr_link" href="dashboard.html"><i class="rt-icon term-icon-dashboard"
                        aria-hidden="true"></i>Dashboard</a>
                <div class="rt-sd" data-sd><button class="rt-sd_trigger" type="button"><i
                            class="rt-icon term-icon-users" aria-hidden="true"></i>UI Elements<span
                            class="rt-sbr_badge">8</span><i class="rt-icon term-icon-chevron-down rt-sd_chevron"
                            aria-hidden="true"></i></button>
                    <div class="rt-sd_children"><a class="rt-sd_child" href="buttons.html">Button</a><a
                            class="rt-sd_child" href="badge.html">Badge</a><a class="rt-sd_child"
                            href="popup.html">Popup</a><a class="rt-sd_child" href="toast.html">Toast</a><a
                            class="rt-sd_child" href="table.html">Table</a><a class="rt-sd_child"
                            href="input.html">Input Form</a><a class="rt-sd_child"
                            href="typography.html">Typography</a><a class="rt-sd_child" href="color.html">Color</a>
                    </div>
                </div>
                <div class="rt-sbr_label">Documentation</div>
                <a class="rt-sbr_link" href="example/doc.html">
                    <i class="rt-icon term-icon-question" aria-hidden="true"></i>
                    Doc
                </a>
            </nav>
            <div class="rt-sbr_footer">
                <div class="rt-sbr_user">
                    <div class="rt-sbr_avatar">C</div>
                    <div class="rt-sbr_user-info">
                        <div class="rt-sbr_user-name">2026. Retro-term</div>
                        <div class="rt-sbr_user-role">All Rights Reserved</div>
                    </div>
                </div>
            </div>
        </aside>
        <main class="rt-main">
            <div class="rt-topbar">
                <button class="rt-topbar_menu-tbl" id="menuBtn" aria-label="Menu"><i class="rt-icon term-icon-menu"
                        aria-hidden="true"></i></button>
                <h1 class="rt-topbar_title">Input Form</h1>
                <div class="rt-topbar_search">
                    <i class="rt-icon term-icon-search" aria-hidden="true"></i>
                    <input type="text" placeholder="Search something...">
                </div>

                <div class="rt-topbar_actions">
                    <button class="rt-topbar_icon-tbl" id="themeToggle" title="Toggle Theme">
                        <i class="rt-icon term-icon-moon moon-icon" aria-hidden="true"></i>
                        <i class="rt-icon term-icon-sun sun-icon" aria-hidden="true" style="display:none"></i>
                    </button>

                    <!-- Dropdown Notification -->
                    <div class="rt-dd" data-dd>
                        <button class="rt-topbar_icon-tbl" data-dd-trigger title="Notifications">
                            <i class="rt-icon term-icon-notification" aria-hidden="true"></i>
                            <span class="rt-topbar_dot"></span>
                        </button>
                        <div class="rt-dd_menu">
                            <div class="rt-dd_label">Notifications</div>
                            <button class="rt-dd_item">
                                <i class="rt-icon term-icon-database" aria-hidden="true"></i>
                                New user signed up
                            </button>
                            <button class="rt-dd_item">
                                <i class="rt-icon term-icon-check" aria-hidden="true"></i>
                                Project completed
                            </button>
                            <button class="rt-dd_item">
                                <i class="rt-icon term-icon-info" aria-hidden="true"></i>
                                Payment received
                            </button>
                            <div class="rt-dd_divider"></div>
                            <button class="rt-dd_item">
                                View all
                                <i class="rt-icon term-icon-chevron-right" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>
                    <div class="rt-dd" data-dd>
                        <button class="rt-topbar_icon-tbl" data-dd-trigger title="Notifications">
                            <i class="rt-icon term-icon-settings" aria-hidden="true"></i>
                        </button>
                        <div class="rt-dd_menu">
                            <button class="rt-dd_item">
                                <i class="rt-icon term-icon-person-circle" aria-hidden="true"></i>
                                Profile
                            </button>
                            <div class="rt-dd_divider"></div>
                            <a class="rt-dd_item" href="login.html">
                                <i class="rt-icon term-icon-logout-box" aria-hidden="true"></i>
                                Logout
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="rt-grid">
                <div class="rt-panel">
                    <div class="rt-panel_head">
                        <div>
                            <div class="rt-panel_title">Basic Inputs</div>
                            <div class="rt-panel_subtitle">Text, email, select, textarea</div>
                        </div>
                    </div>
                    <div class="rt-panel_body" style="display:grid;gap:14px">
                        <input type="text" placeholder="Full name"
                            style="width:100%;height:42px;padding:0 14px;border:1px solid var(--rt-border);background:var(--rt-surface);color:var(--rt-text);outline:none">
                        <input type="email" placeholder="name@example.com"
                            style="width:100%;height:42px;padding:0 14px;border:1px solid var(--rt-border);background:var(--rt-surface);color:var(--rt-text);outline:none">
                        <select
                            style="width:100%;height:42px;padding:0 14px;border:1px solid var(--rt-border);background:var(--rt-surface);color:var(--rt-text);outline:none">
                            <option>Admin</option>
                            <option>Editor</option>
                            <option>Member</option>
                        </select>
                        <textarea rows="4" placeholder="Write a short bio..."
                            style="width:100%;padding:12px 14px;border:1px solid var(--rt-border);background:var(--rt-surface);color:var(--rt-text);outline:none;resize:vertical"></textarea>
                    </div>
                </div>
                <div class="rt-panel">
                    <div class="rt-panel_head">
                        <div>
                            <div class="rt-panel_title">Form Actions</div>
                            <div class="rt-panel_subtitle">Checkboxes and buttons</div>
                        </div>
                    </div>
                    <div class="rt-panel_body" style="display:grid;gap:12px">
                        <label style="display:flex;align-items:center;gap:10px;font-weight:700"><input type="checkbox"
                                checked> Remember me</label>
                        <label style="display:flex;align-items:center;gap:10px;font-weight:700"><input type="checkbox">
                            Send email notification</label>
                        <div class="rt-row" style="margin-top:8px">
                            <button class="rt-tbl rt-tbl-primary">Save</button>
                            <button class="rt-tbl rt-tbl-secondary">Cancel</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../retro-term.js" defer></script>
</body>

</html>
