<!DOCTYPE html>
<html lang="id" data-term-theme="retro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="../core/js/term-theme.js"></script>
  <title>Badge Demo</title>
  <link rel="stylesheet" href="../assets/term-icons/dist/term-icons.css">
  <link rel="stylesheet" href="../main.css">
  <script defer src="../core/js/term-admin.js"></script>
  <script defer src="../core/js/term-layout.js"></script>
  <script defer src="./demo.js"></script>
</head>
<body class="term-layout-fixed" data-term-theme="retro" data-demo-active="badge" data-demo-title="Badge" data-demo-desc="badge samples">
  <div class="term-wrapper">
    <header class="term-header">
      <div class="term-nav-left">
        <button class="term-btn term-btn-icon" type="button" data-demo-action="toggle-sidebar" aria-label="Toggle sidebar">
          <i class="term-icon term-icon-menu" aria-hidden="true"></i>
        </button>
        <div class="term-brand">
          <span>Retro-term</span>
          <span class="term-brand-subtext">demo / badge</span>
        </div>
      </div>
      <div class="term-status-bar"><span>CPU: 12%</span><span>MEM: 4GB</span><span>DEMO</span></div>
    </header>
    <div id="demoSidebarMount"></div>
    <div class="term-overlay" data-demo-action="toggle-sidebar" aria-hidden="true"></div>
    <main class="term-content">
      <section class="term-content-header">
        <div class="term-content-title" id="demoTitle">BADGE</div>
        <div class="term-breadcrumb"><span class="term-breadcrumb-item">example</span><span class="term-breadcrumb-item">badge</span></div>
      </section>
      <section class="term-content-body">
        <div class="term-row">
          <div class="term-col term-col-12 term-col-lg-5 term-mb-2">
            <div class="term-card">
              <div class="term-card-header term-card-header-info"><span class="term-card-title">BADGE_VARIANTS</span></div>
              <div class="term-card-body">
                <div class="term-component-badges">
                  <span class="term-badge term-badge-primary">DEFAULT</span>
                  <span class="term-badge term-badge-info">INFO</span>
                  <span class="term-badge term-badge-success">SUCCESS</span>
                  <span class="term-badge term-badge-warning">WARNING</span>
                  <span class="term-badge term-badge-danger">DANGER</span>
                </div>
              </div>
            </div>
          </div>

          <div class="term-col term-col-12 term-col-lg-7 term-mb-2">
            <div class="term-card">
              <div class="term-card-header term-card-header-primary"><span class="term-card-title">BADGE_USAGE</span></div>
              <div class="term-card-body">
                <div class="term-row">
                  <div class="term-col term-col-12 term-col-md-6 term-mb-2">
                    <div class="term-card term-bg-neutral">
                      <div class="term-card-body">
                        <div class="term-stat-label">TASKS</div>
                        <div class="term-stat-value">12 <span class="term-badge term-badge-success">LIVE</span></div>
                        <div class="term-stat-note">Badge dapat dipasang di status summary.</div>
                      </div>
                    </div>
                  </div>
                  <div class="term-col term-col-12 term-col-md-6 term-mb-2">
                    <div class="term-card term-bg-neutral">
                      <div class="term-card-body">
                        <div class="term-stat-label">NOTIFICATIONS</div>
                        <div class="term-stat-value">07 <span class="term-badge term-badge-warning">NEW</span></div>
                        <div class="term-stat-note">Cocok untuk penanda cepat di navigasi.</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
