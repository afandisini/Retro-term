<!DOCTYPE html>
<html lang="en" data-theme="light" data-base-url="http://localhost:8000/example/">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro-term - Buttons</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900;950&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/term-icons/dist/retro-term-icons.css?v=20260621">
    <link rel="stylesheet" href="../retro-term.css?v=20260621">
</head>

<body>

    <div class="rt-admin">

        <!-- SIDEBAR OVERLAY -->
        <div class="rt-sbr_overlay" id="sidebarOverlay"></div>

        <!-- ===== SIDEBAR ===== -->
        <aside class="rt-sbr" id="sidebar">
            <div class="rt-sbr_brand">
                <span class="rt-brand_dot"></span>
                <span>Retro-term</span>
            </div>

            <div class="rt-sbr_label">Main Menu</div>
            <nav class="rt-sbr_nav">
                <a class="rt-sbr_link" href="dashboard.html">
                    <i class="rt rt-dashboard" aria-hidden="true"></i>
                    Dashboard
                </a>

                <!-- Sidebar Dropdown: Retro-term Ui -->
                <div class="nav-dropdown" data-nav-dropdown>
                    <button class="nav-dropdown-toggle is-active" type="button">
                        <i class="rt rt-users" aria-hidden="true"></i>
                        UI Elements
                        <span class="rt-sbr_badge">8</span>
                        <i class="rt rt-chevron-down nav-dropdown-chevron" aria-hidden="true"></i>
                    </button>
                    <div class="nav-dropdown-menu">
                        <a class="nav-dropdown-item is-active" href="buttons.html">
                            Button
                        </a>
                        <a class="nav-dropdown-item" href="badge.html">
                            Badge
                        </a>
                        <a class="nav-dropdown-item" href="modal.html">
                            Modal
                        </a>
                        <a class="nav-dropdown-item" href="toast.html">
                            Toast
                        </a>
                        <a class="nav-dropdown-item" href="table.html">
                            Table
                        </a>
                        <a class="nav-dropdown-item" href="input.html">
                            Input Form
                        </a>
                        <a class="nav-dropdown-item" href="typography.html">
                            Typography
                        </a>
                        <a class="nav-dropdown-item" href="color.html">
                            Color
                        </a>
                    </div>
                </div>

                <div class="rt-sbr_label">Documentation</div>
                <a class="rt-sbr_link" href="doc.html">
                    <i class="rt rt-question" aria-hidden="true"></i>
                    Doc
                </a>
            </nav>

            <div class="rt-sbr_footer">
                <div class="rt-sbr_user">
                    <div class="rt-sbr_avatar">C</div>
                    <div class="rt-sbr_user-info">
                        <div class="rt-sbr_user-name">2026. Retro-term</div>
                        <div class="rt-sbr_user-role">All Rights Reserved</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="rt-main">
            <!-- TOPBAR -->
            <div class="rt-topbar">
                <button class="rt-topbar_menu-tbl" id="menuBtn" aria-label="Menu">
                    <i class="rt rt-menu" aria-hidden="true"></i>
                </button>
                <div class="rt-topbar_title-wrap">
                    <h1 class="rt-topbar_title" title="Buttons">Buttons</h1>
                    <span class="rt-topbar_breadcrumb" title="UI Components / Buttons">UI Components / Buttons</span>
                </div>

                <div class="rt-topbar_search">
                    <i class="rt rt-search" aria-hidden="true"></i>
                    <input type="text" placeholder="Search something...">
                </div>

                <div class="rt-topbar_actions">
                    <button class="rt-topbar_icon-tbl" id="themeToggle" title="Toggle Theme">
                        <i class="rt rt-moon moon-icon" aria-hidden="true"></i>
                        <i class="rt rt-sun sun-icon" aria-hidden="true" style="display:none"></i>
                    </button>

                    <!-- Dropdown Notification -->
                    <div class="dropdown" data-dropdown>
                        <button class="rt-topbar_icon-tbl" data-dropdown-trigger title="Notifications">
                            <i class="rt rt-notification" aria-hidden="true"></i>
                            <span class="rt-topbar_dot"></span>
                        </button>
                        <div class="dropdown-menu">
                            <div class="dropdown-label">Notifications</div>
                            <button class="dropdown-item">
                                <i class="rt rt-database" aria-hidden="true"></i>
                                New user signed up
                            </button>
                            <button class="dropdown-item">
                                <i class="rt rt-check" aria-hidden="true"></i>
                                Project completed
                            </button>
                            <button class="dropdown-item">
                                <i class="rt rt-info" aria-hidden="true"></i>
                                Payment received
                            </button>
                            <div class="dropdown-divider"></div>
                            <button class="dropdown-item">
                                View all
                                <i class="rt rt-chevron-right" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>
                    <div class="dropdown" data-dropdown>
                        <button class="rt-topbar_icon-tbl" data-dropdown-trigger title="Notifications">
                            <i class="rt rt-settings" aria-hidden="true"></i>
                        </button>
                        <div class="dropdown-menu">
                            <button class="dropdown-item">
                                <i class="rt rt-person-circle" aria-hidden="true"></i>
                                Profile
                            </button>
                            <div class="dropdown-divider"></div>
                            <a class="dropdown-item" href="../login.html">
                                <i class="rt rt-logout-box" aria-hidden="true"></i>
                                Logout
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- DEMO: BUTTONS (btn) -->
            <div class="card rt-section">
                <div class="card-header">
                    <div>
                        <div class="card-title">Button Component (btn)</div>
                        <div class="card-subtitle">Color variants and sizes</div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="rt-label">Colors</div>
                    <div class="rt-flow rt-py2">
                        <button class="btn btn-primary">Primary</button>
                        <button class="btn btn-secondary">Secondary</button>
                        <button class="btn btn-success">Success</button>
                        <button class="btn btn-warning">Warning</button>
                        <button class="btn btn-danger">Danger</button>
                        <button class="btn btn-accent">Accent</button>
                        <button class="btn btn-purple">Purple</button>
                        <button class="btn btn-ghost">Ghost</button>
                        <button class="btn btn-outline-primary">Outline</button>
                    </div>

                    <div class="rt-label">With Icons</div>
                    <div class="rt-flow rt-py2">
                        <button class="btn btn-primary">
                            <i class="rt rt-add" aria-hidden="true"></i>
                            Add Data
                        </button>
                        <button class="btn btn-success">
                            <i class="rt rt-check" aria-hidden="true"></i>
                            Save
                        </button>
                        <button class="btn btn-danger">
                            <i class="rt rt-delete" aria-hidden="true"></i>
                            Delete
                        </button>
                        <button class="btn btn-outline-primary">
                            <i class="rt rt-download" aria-hidden="true"></i>
                            Download
                        </button>
                    </div>

                    <div class="rt-label">Sizes</div>
                    <div class="rt-flow rt-py2">
                        <button class="btn btn-primary btn-sm">Small</button>
                        <button class="btn btn-primary">Default</button>
                        <button class="btn btn-primary btn-lg">Large</button>
                        <button class="btn btn-primary btn-icon" title="Icon only">
                            <i class="rt rt-add" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../retro-term.js?v=20260621" defer></script>

</body>

</html>
