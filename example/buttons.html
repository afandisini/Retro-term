<!DOCTYPE html>
<html lang="en" data-theme="light" data-base-url="http://localhost:8000/example/">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro-term - Buttons</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900;950&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../dist/retro-term-icons.css">
    <link rel="stylesheet" href="../dist/retro-term.min.css">
</head>

<body>

    <div class="rt-admin">

        <!-- SIDEBAR OVERLAY -->
        <div class="rt-sbr-overlay" id="sidebarOverlay"></div>

        <!-- ===== SIDEBAR ===== -->
        <aside class="rt-sbr" id="sidebar">
            <div class="rt-sbr-brand">
                <span class="rt-brand-dot"></span>
                <span>Retro-term</span>
            </div>

            <div class="rt-sbr-label">Main Menu</div>
            <nav class="rt-sbr-nav">
                <a class="rt-sbr-link" href="dashboard.html">
                    <i class="rt rt-dashboard" aria-hidden="true"></i>
                    Dashboard
                </a>

                <!-- Sidebar Dropdown: Retro-term Ui -->
                <div class="rt-nav-dropdown" data-rt-nav-dropdown>
                    <button class="rt-nav-dropdown-toggle is-active" type="button">
                        <i class="rt rt-users" aria-hidden="true"></i>
                        UI Elements
                        <span class="rt-sbr-badge">8</span>
                        <i class="rt rt-chevron-down rt-nav-dropdown-chevron" aria-hidden="true"></i>
                    </button>
                    <div class="rt-nav-dropdown-menu">
                        <a class="rt-nav-dropdown-item is-active" href="buttons.html">
                            Button
                        </a>
                        <a class="rt-nav-dropdown-item" href="badge.html">
                            Badge
                        </a>
                        <a class="rt-nav-dropdown-item" href="modal.html">
                            Modal
                        </a>
                        <a class="rt-nav-dropdown-item" href="toast.html">
                            Toast
                        </a>
                        <a class="rt-nav-dropdown-item" href="table.html">
                            Table
                        </a>
                        <a class="rt-nav-dropdown-item" href="input.html">
                            Input Form
                        </a>
                        <a class="rt-nav-dropdown-item" href="typography.html">
                            Typography
                        </a>
                        <a class="rt-nav-dropdown-item" href="color.html">
                            Color
                        </a>
                    </div>
                </div>

                <div class="rt-sbr-label">Documentation</div>
                <a class="rt-sbr-link" href="doc.html">
                    <i class="rt rt-question" aria-hidden="true"></i>
                    Doc
                </a>
            </nav>

            <div class="rt-sbr-footer">
                <div class="rt-sbr-user">
                    <div class="rt-sbr-avatar">C</div>
                    <div class="rt-sbr-user-info">
                        <div class="rt-sbr-user-name">2026. Retro-term</div>
                        <div class="rt-sbr-user-role">All Rights Reserved</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="rt-main">
            <!-- TOPBAR -->
            <div class="rt-topbar">
                <button class="rt-topbar-menu-tbl" id="menuBtn" aria-label="Menu">
                    <i class="rt rt-menu" aria-hidden="true"></i>
                </button>
                <div class="rt-topbar-title-wrap">
                    <h1 class="rt-topbar-title" title="Buttons">Buttons</h1>
                    <span class="rt-topbar-breadcrumb" title="UI Components / Buttons">UI Components / Buttons</span>
                </div>

                <div class="rt-topbar-search">
                    <i class="rt rt-search" aria-hidden="true"></i>
                    <input type="text" placeholder="Search something...">
                </div>

                <div class="rt-topbar-actions">
                    <button class="rt-topbar-icon-tbl" id="themeToggle" title="Toggle Theme">
                        <i class="rt rt-moon moon-icon" aria-hidden="true"></i>
                        <i class="rt rt-sun sun-icon" aria-hidden="true" style="display:none"></i>
                    </button>

                    <!-- Dropdown Notification -->
                    <div class="rt-dropdown" data-rt-dropdown>
                        <button class="rt-topbar-icon-tbl" data-rt-dropdown-trigger title="Notifications">
                            <i class="rt rt-notification" aria-hidden="true"></i>
                            <span class="rt-topbar-dot"></span>
                        </button>
                        <div class="rt-dropdown-menu">
                            <div class="rt-dropdown-label">Notifications</div>
                            <button class="rt-dropdown-item">
                                <i class="rt rt-database" aria-hidden="true"></i>
                                New user signed up
                            </button>
                            <button class="rt-dropdown-item">
                                <i class="rt rt-check" aria-hidden="true"></i>
                                Project completed
                            </button>
                            <button class="rt-dropdown-item">
                                <i class="rt rt-info" aria-hidden="true"></i>
                                Payment received
                            </button>
                            <div class="rt-dropdown-divider"></div>
                            <button class="rt-dropdown-item">
                                View all
                                <i class="rt rt-chevron-right" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>
                    <div class="rt-dropdown" data-rt-dropdown>
                        <button class="rt-topbar-icon-tbl" data-rt-dropdown-trigger title="Notifications">
                            <i class="rt rt-settings" aria-hidden="true"></i>
                        </button>
                        <div class="rt-dropdown-menu">
                            <button class="rt-dropdown-item">
                                <i class="rt rt-person-circle" aria-hidden="true"></i>
                                Profile
                            </button>
                            <div class="rt-dropdown-divider"></div>
                            <a class="rt-dropdown-item" href="../login.html">
                                <i class="rt rt-logout-box" aria-hidden="true"></i>
                                Logout
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- DEMO: BUTTONS (rt-btn) -->
            <div class="rt-card rt-section">
                <div class="rt-card-header">
                    <div>
                        <div class="rt-card-title">Button Component (rt-btn)</div>
                        <div class="rt-card-subtitle">Color variants and sizes</div>
                    </div>
                </div>
                <div class="rt-card-body">
                    <div class="rt-label">Colors</div>
                    <div class="rt-flow rt-py2">
                        <button class="rt-btn rt-btn-primary">Primary</button>
                        <button class="rt-btn rt-btn-secondary">Secondary</button>
                        <button class="rt-btn rt-btn-success">Success</button>
                        <button class="rt-btn rt-btn-warning">Warning</button>
                        <button class="rt-btn rt-btn-danger">Danger</button>
                        <button class="rt-btn rt-btn-accent">Accent</button>
                        <button class="rt-btn rt-btn-purple">Purple</button>
                        <button class="rt-btn rt-btn-ghost">Ghost</button>
                        <button class="rt-btn rt-btn-outline-primary">Outline</button>
                    </div>

                    <div class="rt-label">With Icons</div>
                    <div class="rt-flow rt-py2">
                        <button class="rt-btn rt-btn-primary">
                            <i class="rt rt-add" aria-hidden="true"></i>
                            Add Data
                        </button>
                        <button class="rt-btn rt-btn-success">
                            <i class="rt rt-check" aria-hidden="true"></i>
                            Save
                        </button>
                        <button class="rt-btn rt-btn-danger">
                            <i class="rt rt-delete" aria-hidden="true"></i>
                            Delete
                        </button>
                        <button class="rt-btn rt-btn-outline-primary">
                            <i class="rt rt-download" aria-hidden="true"></i>
                            Download
                        </button>
                    </div>

                    <div class="rt-label">Sizes</div>
                    <div class="rt-flow rt-py2">
                        <button class="rt-btn rt-btn-primary rt-btn-sm">Small</button>
                        <button class="rt-btn rt-btn-primary">Default</button>
                        <button class="rt-btn rt-btn-primary rt-btn-lg">Large</button>
                        <button class="rt-btn rt-btn-primary rt-btn-icon" title="Icon only">
                            <i class="rt rt-add" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../dist/retro-term.min.js" defer></script>

</body>

</html>
