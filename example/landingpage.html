<!DOCTYPE html>
<html lang="id" data-term-theme="retro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="../core/js/term-theme.js"></script>
  <title>Landingpage Demo</title>
  <link rel="stylesheet" href="../assets/term-icons/dist/term-icons.css">
  <link rel="stylesheet" href="../main.css">
  <script defer src="../core/js/term-admin.js"></script>
  <script defer src="../core/js/term-layout.js"></script>
  <script defer src="./demo.js"></script>
</head>
<body class="term-layout-fixed" data-term-theme="retro" data-demo-active="landingpage" data-demo-title="Landingpage" data-demo-desc="landing page samples">
  <div class="term-wrapper">
    <header class="term-header">
      <div class="term-nav-left">
        <button class="term-btn term-btn-icon" type="button" data-demo-action="toggle-sidebar" aria-label="Toggle sidebar">
          <i class="term-icon term-icon-menu" aria-hidden="true"></i>
        </button>
        <div class="term-brand">
          <span>Retro-term</span>
          <span class="term-brand-subtext">demo / landingpage</span>
        </div>
      </div>
      <div class="term-status-bar"><span>CPU: 12%</span><span>MEM: 4GB</span><span>DEMO</span></div>
    </header>
    <div id="demoSidebarMount"></div>
    <div class="term-overlay" data-demo-action="toggle-sidebar" aria-hidden="true"></div>
    <main class="term-content">
      <section class="term-content-header">
        <div class="term-content-title" id="demoTitle">LANDINGPAGE</div>
        <div class="term-breadcrumb"><span class="term-breadcrumb-item">example</span><span class="term-breadcrumb-item">landingpage</span></div>
      </section>
      <section class="term-content-body">
        <div class="term-card">
          <div class="term-card-header term-card-header-info"><span class="term-card-title">LANDINGPAGE DEMO</span></div>
          <div class="term-card-body">
            <p>Sidebar demo tersedia di kiri untuk berpindah ke halaman komponen lain.</p>
            <p style="margin-top:12px; color:var(--term-muted);">Halaman ini disiapkan untuk contoh landingpage.</p>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
