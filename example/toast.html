<!DOCTYPE html>
<html lang="en" data-theme="light" data-base-url="http://localhost:8000/example/">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro-term - Toast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900;950&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../dist/retro-term-icons.css">
    <link rel="stylesheet" href="../dist/retro-term.min.css">
</head>

<body>
    <div class="rt-admin">
        <div class="rt-sbr-overlay" id="sidebarOverlay"></div>
        <aside class="rt-sbr" id="sidebar">
            <div class="rt-sbr-brand"><span class="rt-brand-dot"></span><span>Retro-term</span></div>
            <div class="rt-sbr-label">Main Menu</div>
            <nav class="rt-sbr-nav"><a class="rt-sbr-link" href="dashboard.html"><i class="rt rt-dashboard"
                        aria-hidden="true"></i>Dashboard</a>
                <div class="rt-nav-dropdown" data-rt-nav-dropdown><button class="rt-nav-dropdown-toggle" type="button"><i
                            class="rt rt-users" aria-hidden="true"></i>UI Elements<span class="rt-sbr-badge">8</span><i
                            class="rt rt-chevron-down rt-nav-dropdown-chevron" aria-hidden="true"></i></button>
                    <div class="rt-nav-dropdown-menu"><a class="rt-nav-dropdown-item" href="buttons.html">Button</a><a
                            class="rt-nav-dropdown-item" href="badge.html">Badge</a><a class="rt-nav-dropdown-item"
                            href="modal.html">Modal</a><a class="rt-nav-dropdown-item" href="toast.html">Toast</a><a
                            class="rt-nav-dropdown-item" href="table.html">Table</a><a class="rt-nav-dropdown-item"
                            href="input.html">Input Form</a><a class="rt-nav-dropdown-item"
                            href="typography.html">Typography</a><a class="rt-nav-dropdown-item"
                            href="color.html">Color</a>
                    </div>
                </div>
                <div class="rt-sbr-label">Documentation</div>
                <a class="rt-sbr-link" href="doc.html">
                    <i class="rt rt-question" aria-hidden="true"></i>
                    Doc
                </a>
            </nav>
            <div class="rt-sbr-footer">
                <div class="rt-sbr-user">
                    <div class="rt-sbr-avatar">C</div>
                    <div class="rt-sbr-user-info">
                        <div class="rt-sbr-user-name">2026. Retro-term</div>
                        <div class="rt-sbr-user-role">All Rights Reserved</div>
                    </div>
                </div>
            </div>
        </aside>
        <main class="rt-main">
            <div class="rt-topbar">
                <button class="rt-topbar-menu-tbl" id="menuBtn" aria-label="Menu"><i class="rt rt-menu"
                        aria-hidden="true"></i></button>
                <div class="rt-topbar-title-wrap">
                    <h1 class="rt-topbar-title" title="Toast">Toast</h1>
                    <span class="rt-topbar-breadcrumb" title="Feedback / Toasts">Feedback / Toasts</span>
                </div>
                <div class="rt-topbar-search">
                    <i class="rt rt-search" aria-hidden="true"></i>
                    <input type="text" placeholder="Search something...">
                </div>

                <div class="rt-topbar-actions">
                    <button class="rt-topbar-icon-tbl" id="themeToggle" title="Toggle Theme">
                        <i class="rt rt-moon moon-icon" aria-hidden="true"></i>
                        <i class="rt rt-sun sun-icon" aria-hidden="true" style="display:none"></i>
                    </button>

                    <!-- Dropdown Notification -->
                    <div class="rt-dropdown" data-rt-dropdown>
                        <button class="rt-topbar-icon-tbl" data-rt-dropdown-trigger title="Notifications">
                            <i class="rt rt-notification" aria-hidden="true"></i>
                            <span class="rt-topbar-dot"></span>
                        </button>
                        <div class="rt-dropdown-menu">
                            <div class="rt-dropdown-label">Notifications</div>
                            <button class="rt-dropdown-item">
                                <i class="rt rt-database" aria-hidden="true"></i>
                                New user signed up
                            </button>
                            <button class="rt-dropdown-item">
                                <i class="rt rt-check" aria-hidden="true"></i>
                                Project completed
                            </button>
                            <button class="rt-dropdown-item">
                                <i class="rt rt-info" aria-hidden="true"></i>
                                Payment received
                            </button>
                            <div class="rt-dropdown-divider"></div>
                            <button class="rt-dropdown-item">
                                View all
                                <i class="rt rt-chevron-right" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>
                    <div class="rt-dropdown" data-rt-dropdown>
                        <button class="rt-topbar-icon-tbl" data-rt-dropdown-trigger title="Notifications">
                            <i class="rt rt-settings" aria-hidden="true"></i>
                        </button>
                        <div class="rt-dropdown-menu">
                            <button class="rt-dropdown-item">
                                <i class="rt rt-person-circle" aria-hidden="true"></i>
                                Profile
                            </button>
                            <div class="rt-dropdown-divider"></div>
                            <a class="rt-dropdown-item" href="../login.html">
                                <i class="rt rt-logout-box" aria-hidden="true"></i>
                                Logout
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="rt-card rt-section rt-p3">
                <h2>Toast Variants</h2>
                <div class="rt-row rt-flow--sm">
                    <button class="rt-btn rt-btn-success" data-rt-toast-variant="success">Success</button>
                    <button class="rt-btn rt-btn-warning" data-rt-toast-variant="warning">Warning</button>
                    <button class="rt-btn rt-btn-danger" data-rt-toast-variant="danger">Danger</button>
                </div>
            </div>
            <div class="rt-card rt-section rt-p3">
                <h2>Toast Position</h2>
                <div class="rt-row rt-flow">
                    <button class="rt-btn rt-btn-secondary" data-rt-toast-position-btn data-rt-toast-position="top-left">Top
                        Left</button>
                    <button class="rt-btn rt-btn-secondary" data-rt-toast-position-btn data-rt-toast-position="top-center">Top
                        Center</button>
                    <button class="rt-btn rt-btn-secondary" data-rt-toast-position-btn data-rt-toast-position="top-right">Top
                        Right</button>
                    <button class="rt-btn rt-btn-secondary" data-rt-toast-position-btn data-rt-toast-position="bottom-left">Bottom
                        Left</button>
                    <button class="rt-btn rt-btn-secondary" data-rt-toast-position-btn data-rt-toast-position="bottom-center">Bottom
                        Center</button>
                    <button class="rt-btn rt-btn-secondary" data-rt-toast-position-btn data-rt-toast-position="bottom-right">Bottom
                        Right</button>
                </div>
            </div>
        </main>
    </div>

    <div class="rt-toast rt-toast--success" id="demoToast" aria-live="polite" aria-atomic="true">
        <div class="rt-toast-icon"><i class="rt rt-success-circle" aria-hidden="true"></i></div>
        <div class="rt-toast-content">
            <div class="rt-toast-title">Toast Success</div>
            <div class="rt-toast-text">Example `rt-toast` element for short-lived messages.</div>
        </div>
        <button class="rt-toast-close" type="button" id="toastCloseBtn" aria-label="Close toast">
            <i class="rt rt-close" aria-hidden="true"></i>
        </button>
    </div>

    <script src="../dist/retro-term.min.js" defer></script>
</body>

</html>
